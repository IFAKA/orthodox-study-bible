name: Bug report
description: Create a report to help us improve
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: How can we reproduce it?
      description: List the steps to reproduce the bug
      placeholder: |
        1. Open the app
        2. Press '/' to search
        3. Type '...'
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: OSB Version
      description: What version of the app are you running? (Run `osb --version`)
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output or screenshots here.
